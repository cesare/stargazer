name: frontend-ci

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/**"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/**"

defaults:
  run:
    working-directory: ./frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: "24.2.0"
        cache: "npm"
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Lint
      run: npm run lint
