name: golang-ci

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/**"

defaults:
  run:
    working-directory: ./backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.sum
            backend/go.mod
      - name: Install Dependencies
        run: go mod download
      - name: Build
        run: make build
      - name: Lint Code
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
